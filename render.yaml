services:
  - type: web
    name: job-tracker-frontend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l $PORT
    envVars:
      - key: PORT
        value: 10000
      - key: VITE_API_URL
        value: https://job-tracker-api-dgs0.onrender.com
