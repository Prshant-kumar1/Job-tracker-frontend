services:
  - type: web
    name: job-tracker-frontend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: PORT
        value: 10000
      # VITE_ vars are embedded at BUILD time by Vite, so this must be
      # set before the build runs — which Render does automatically.
      - key: VITE_API_URL
        value: https://job-tracker-api-dgs0.onrender.com
