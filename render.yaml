services:
  - type: web
    name: job-tracker-frontend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npx vite preview --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 10000
      # Update this to your actual backend API URL on Render
      - key: VITE_API_URL
        value: https://job-tracker-api-dgs0.onrender.com
